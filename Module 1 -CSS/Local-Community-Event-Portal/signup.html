<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Local Community Event Portal</title>
    <link rel="stylesheet" href="style.css">
    <style>
                /* Styles labels inside the signup form */
        form {
            label {
                display: block;      /* Places each label on a new line */
                margin: 10px;        /* Adds spacing around labels */
                font-weight: bold;   /* Makes label text bold */
                text-align: left;    /* Aligns label text to the left */
            }
        }

        /* Styles hyperlinks */
        a {
            text-decoration: none;  /* Removes underline from links */
            font-weight: bold;      /* Makes link text bold */
            display: inline-block;  /* Allows padding and margins */
            margin: 10px;           /* Adds spacing around links */
            align-items: center;    /* Aligns content inside link */
            padding: 5px 10px;      /* Adds inner spacing */
            border-radius: 10px;    /* Rounds link corners */
        }

/* Styles the page background */
body {
    background-image: url("images/login-back.png"); /* Sets background image */
    background-size: cover;                         /* Makes image cover entire page */
    background-position: center;                    /* Centers the image */
}
    </style>
</head>
<body>
    <header>
        <h1 align="center">Sign Up - Local Community Event Portal</h1>
    </header>
    <main>
        <form action="login.html" method="post">
            <h1 align="center">Create Account</h1>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required><br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required><br><br>
            <button type="submit" value="Sign Up">Sign Up</button><br><br>
            <a href="login.html" style="margin-left: 20px;">Already have an account? Login </a>
        </form>
    </main>
</body>
</html>
