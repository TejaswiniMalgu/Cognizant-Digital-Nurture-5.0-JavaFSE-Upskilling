<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help - Local Community Event Portal</title>
    <style>
        /* Styles the contact/help section container */
        #contact {
            background-color: #b3d9ebd5; /* Light blue background color */
        padding: 20px;               /* Adds space inside the container */
        border-radius: 10px;         /* Rounds the corners */
        }}

        /* Styles all images on the page */
        img {
            display: block;      /* Makes image a block element */
            width: 90%;          /* Responsive width */
            max-width: 900px;    /* Prevents image from becoming too large */
            height: auto;        /* Maintains aspect ratio */
            margin: 0 auto;      /* Centers the image horizontally */
        }
        

    </style>
</head>
<body>
    <header>
        <h1 align="center">Local Community Event Portal</h1>
    </header>
    <main>
        <div id="contact">
        <h1 align="center">Help Page</h1>
        <p align="center">If you need assistance, please contact our support team at <a href="mailto:support@localcommunityeventportal.com">support@localcommunityeventportal.com</a>.</p>
        <img src="images/contact.png" alt="Help Image" width="600" height="400">
        </div>
    </main>
</body>
</html>
