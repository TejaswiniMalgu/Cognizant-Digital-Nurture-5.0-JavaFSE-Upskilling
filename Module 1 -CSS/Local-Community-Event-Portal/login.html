<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Local Community Event Portal</title>
    <link rel="stylesheet" href="style.css">
    <style>
                /* Styles labels inside the login form */
        form {
            label {
                display: block;      /* Places label on a new line */
                margin: 10px;        /* Adds space around labels */
                font-weight: bold;   /* Makes label text bold */
                text-align: left;    /* Aligns label text to the left */
                opacity: 0.8;        /* Makes labels slightly transparent */
            }
        }

        /* Styles hyperlinks */
        a {
            text-decoration: none;  /* Removes underline */
            font-weight: bold;      /* Makes link text bold */
            display: inline-block;  /* Allows padding and margin */
            margin: 10px;           /* Space around link */
            align-items: center;    /* Aligns content (useful in flex layouts) */
            padding: 5px 10px;      /* Inner spacing */
            border-radius: 10px;    /* Rounded corners */
        }

        /* Styles the page background */
        body {
            background-image: url("images/login-back.png"); /* Background image */
            background-size: cover;                         /* Covers entire page */
            background-position: center;                    /* Centers image */
        }
    </style>
</head>
<body>
    
    <main>
    
        <form action="login-welcome-banner.html" method="post">
            <h1 align="center" style="color: #075d79;">Welcome to the Local Community Event Portal</h1><br>
            <h1 align="center">Login</h1>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required><br><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required><br><br>
            <button type="submit" value="Login">Login</button><br><br>
            <a href="signup.html" style="margin-left: 20px;">New User? SignUp </a>
        </form>
    
    </main>
</body>
</html>
